name: CI

on:
  pull_request:
    branches: [main]

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: Build Android
        run: bundle exec fastlane build_android
      - name: Test Android
        run: bundle exec fastlane test_android
      - name: Detect Android
        run: bundle exec fastlane detect_android

  ios:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - name: SwiftLint
        run: swiftlint --config iosApp/.swiftlint.yml iosApp/iosApp
      - name: Build iOS
        run: bundle exec fastlane build_ios
      - name: Test iOS
        run: bundle exec fastlane test_ios
